<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synoptik</title>
  <link rel="stylesheet" href="/src/ui/styles.css">
</head>
<body>
  <canvas id="gl"></canvas>
  <canvas id="ring"></canvas>
  <div id="intro">
    <h1>Synoptik</h1>
    <p>Modular Music Visualizer</p>
    <div class="sub">12 Visualizer &middot; Patchbay &middot; 25 Post-FX &middot; Spotify</div>
  </div>
  <div id="info"><div class="ti"><em>S</em> — Synoptik</div></div>
  <div id="keys">
    <kbd>P</kbd> Panel
    <kbd>W</kbd> Wireframe
    <kbd>Space</kbd> Pause
    <kbd>F</kbd> Fullscreen<br>
    <kbd>M</kbd> Mic
    <kbd>R</kbd> Randomize
    <kbd>S</kbd> Spotify
    <kbd>1-9</kbd> Topologie<br>
    <kbd>Tab</kbd> Tab
    <kbd>Esc</kbd> Schliessen
  </div>
  <div id="dz"><div class="dl">Audio ablegen</div></div>
  <div id="yt-player" style="position:fixed;bottom:16px;left:16px;z-index:150;width:240px;height:135px;border-radius:4px;overflow:hidden;display:none;border:1px solid rgba(255,255,255,0.1);"></div>
  <div id="ui-root"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
